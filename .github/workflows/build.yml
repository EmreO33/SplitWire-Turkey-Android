name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
            echo "Release keystore present — release APK will be signed."
          else
            echo "No keystore secret — release APK will be unsigned."
          fi

      - name: Build FOSS debug APK
        run: ./gradlew --no-daemon assembleFossDebug

      - name: Build release editions
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleFossRelease assemblePlayRelease bundlePlayRelease

      - name: Stage artifacts
        run: |
          mkdir -p out
          apk=app/build/outputs/apk

          cp "$apk/foss/debug/app-foss-debug.apk" "out/SplitWire-Turkey-debug.apk"

          # FOSS release (ad-free) — primary download for F-Droid / GitHub
          if [ -f "$apk/foss/release/app-foss-release.apk" ]; then
            cp "$apk/foss/release/app-foss-release.apk" "out/SplitWire-Turkey.apk"
          else
            cp "$apk/foss/release/app-foss-release-unsigned.apk" "out/SplitWire-Turkey-unsigned.apk"
          fi

          # Play edition (with ads) — APK for sideload testing + AAB for Play upload
          if [ -f "$apk/play/release/app-play-release.apk" ]; then
            cp "$apk/play/release/app-play-release.apk" "out/SplitWire-Turkey-play.apk"
          fi
          if [ -f app/build/outputs/bundle/playRelease/app-play-release.aab ]; then
            cp app/build/outputs/bundle/playRelease/app-play-release.aab "out/SplitWire-Turkey-play.aab"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SplitWire-Turkey-builds
          path: out/*
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
